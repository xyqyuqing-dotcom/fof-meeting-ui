        let selectedManager = null;

        function initPage() {
            renderTable();
            populateModalSelects();
        }

        function renderTable() {
            const tbody = document.getElementById('relationTableBody');

            if (relationsData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: #999;">
                            暂无关联记录，点击"新增私募群管理人关系"添加
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = relationsData.map((relation, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${relation.managerName}</strong></td>
                    <td>
                        <div class="group-info">
                            <div class="group-icon" style="background: ${relation.groupColor}">${relation.groupIcon}</div>
                            <div class="group-details">
                                <span class="group-name">${relation.groupName}</span>
                                <span class="group-id">${relation.robotName}</span>
                            </div>
                        </div>
                    </td>
                    <td>${renderRules(relation)}</td>
                    <td>
                        <a href="#" class="action-link" onclick="editRelation(${relation.id})">编辑</a>
                        <a href="#" class="action-link" onclick="deleteRelation(${relation.id})">删除</a>
                    </td>
                </tr>
            `).join('');
        }

        function renderRules(relation) {
            if (!relation.exactProducts || relation.exactProducts.length === 0) {
                return '<span class="rule-tag default">未指定产品</span>';
            }

            // 显示前3个产品 + 等共N个
            const products = relation.exactProductNames || [];
            const total = products.length;

            if (total <= 3) {
                return products.map(name =>
                    `<span class="rule-tag">${name}</span>`
                ).join('');
            } else {
                const first3 = products.slice(0, 3).map(name =>
                    `<span class="rule-tag">${name}</span>`
                ).join('');

                return `${first3}<span class="rule-tag">等共${total}个</span>`;
            }
        }

        function populateModalSelects() {
            const managerSelect = document.getElementById('modalManagerSelect');
            managerSelect.innerHTML = '<option value="">请选择管理人</option>' +
                managerData.map(m => `<option value="${m.id}">${m.name}</option>`).join('');

            updateGroupOptions();
        }

        function onManagerChange() {
            updateGroupOptions();

            // 根据选中的管理人过滤产品列表
            const managerId = parseInt(document.getElementById('modalManagerSelect').value);
            filterProductsByManager(managerId);

            // 清空已选产品（换管理人后需要重新选择）
            selectedProductIds = [];
            document.getElementById('productSearchInput').value = '';
            updateSelectedProductsDisplay();
        }

        // 根据管理人ID过滤产品
        function filterProductsByManager(managerId) {
            let filteredProducts;

            if (!managerId || isNaN(managerId)) {
                // 未选择管理人时显示提示
                filteredProducts = [];
            } else {
                // 只显示该管理人下的产品
                filteredProducts = productData.filter(p => p.managerId === managerId);
            }

            renderProductList(filteredProducts);

            // 显示产品数量提示
            const container = document.getElementById('productListContainer');
            if (managerId && filteredProducts.length > 0) {
                container.title = `该管理人下共 ${filteredProducts.length} 个产品`;
            }
        }

        function updateGroupOptions() {
            const groupSelect = document.getElementById('modalGroupSelect');
            groupSelect.innerHTML = '<option value="">请选择群</option>' +
                groupData.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        }

        function addRelation() {
            document.getElementById('modalTitle').textContent = '新增私募群管理人关系';
            document.getElementById('editId').value = '';
            document.getElementById('modalManagerSelect').value = '';
            document.getElementById('modalGroupSelect').value = '';

            // 重置产品选择器
            selectedProductIds = [];
            document.getElementById('productSearchInput').value = '';
            renderProductList([]);  // 未选择管理人时显示空列表
            updateSelectedProductsDisplay();

            openModal();
        }

        function editRelation(id) {
            const relation = relationsData.find(r => r.id === id);
            if (!relation) return;

            document.getElementById('modalTitle').textContent = '编辑关联规则';
            document.getElementById('editId').value = id;
            document.getElementById('modalManagerSelect').value = relation.managerId;
            document.getElementById('modalGroupSelect').value = relation.groupId;

            // 恢复已选产品
            selectedProductIds = [...(relation.exactProducts || [])];
            document.getElementById('productSearchInput').value = '';

            // 根据管理人的产品列表渲染
            const managerId = relation.managerId;
            filterProductsByManager(managerId);
            updateSelectedProductsDisplay();

            openModal();
        }

        function deleteRelation(id) {
            if (!confirm('确定要删除这条关联规则吗？')) return;

            relationsData = relationsData.filter(r => r.id !== id);
            renderTable();
        }

        function openModal() {
            document.getElementById('ruleModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('ruleModal').classList.remove('show');
        }

        function saveRuleConfig() {
            const editId = document.getElementById('editId').value;
            const managerId = parseInt(document.getElementById('modalManagerSelect').value);
            const groupId = parseInt(document.getElementById('modalGroupSelect').value);

            if (!managerId) {
                alert('请选择私募管理人');
                return;
            }
            if (!groupId) {
                alert('请选择私募群');
                return;
            }

            const manager = managerData.find(m => m.id === managerId);
            const group = groupData.find(g => g.id === groupId);

            // 获取已选产品信息
            const exactProducts = selectedProductIds;
            const exactProductNames = selectedProductIds.map(id =>
                productData.find(p => p.id === id)?.name || id
            );

            const relationData = {
                managerId,
                managerName: manager.name,
                groupId,
                groupName: group.name,
                groupIcon: group.name.charAt(0),
                groupColor: getRandomGradient(),
                robotName: group.robotName,
                exactProducts,
                exactProductNames
            };

            if (editId) {
                const index = relationsData.findIndex(r => r.id === parseInt(editId));
                if (index > -1) {
                    relationData.id = parseInt(editId);
                    relationsData[index] = relationData;
                }
            } else {
                relationData.id = nextId++;
                relationsData.push(relationData);
            }

            closeModal();
            renderTable();
        }

        // ========== 产品选择器核心功能 ==========
        let selectedProductIds = [];  // 当前选中的产品ID数组

        // 搜索产品（带防抖）
        let searchTimer = null;
        function onProductSearch(keyword) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const filtered = searchProducts(keyword);
                renderProductList(filtered);
            }, 300);  // 300ms防抖
        }

        // 搜索产品算法（先按管理人过滤，再搜索）
        function searchProducts(keyword) {
            const managerId = parseInt(document.getElementById('modalManagerSelect')?.value);

            // 第一步：根据管理人过滤
            let baseProducts;
            if (!managerId || isNaN(managerId)) {
                baseProducts = [];
            } else {
                baseProducts = productData.filter(p => p.managerId === managerId);
            }

            // 第二步：如果没有搜索关键词，直接返回该管理人的所有产品
            if (!keyword || keyword.trim() === '') {
                return baseProducts;
            }

            // 第三步：在管理人的产品中进行关键词搜索
            const kw = keyword.toLowerCase().trim();
            return baseProducts.filter(p =>
                p.name.toLowerCase().includes(kw) ||
                p.code.toLowerCase().includes(kw) ||
                p.strategy.toLowerCase().includes(kw)
            );
        }

        // 渲染产品列表
        function renderProductList(products) {
            const container = document.getElementById('productList');
            const managerId = parseInt(document.getElementById('modalManagerSelect')?.value);

            if (!products || products.length === 0) {
                if (!managerId || isNaN(managerId)) {
                    // 未选择管理人
                    container.innerHTML = `
                        <div style="text-align: center; padding: 30px; color: #999;">
                            <div style="font-size: 36px; margin-bottom: 8px;">👤</div>
                            <div>请先选择私募管理人</div>
                        </div>
                    `;
                } else {
                    // 搜索无结果或该管理人暂无产品
                    container.innerHTML = `
                        <div style="text-align: center; padding: 30px; color: #999;">
                            <div style="font-size: 36px; margin-bottom: 8px;">�</div>
                            <div>该管理人暂无匹配的产品</div>
                        </div>
                    `;
                }
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-item ${selectedProductIds.includes(product.id) ? 'selected' : ''}"
                     onclick="toggleProductSelection('${product.id}')">
                    <input type="checkbox" class="product-checkbox"
                           ${selectedProductIds.includes(product.id) ? 'checked' : ''}
                           onclick="event.stopPropagation(); toggleProductSelection('${product.id}')">
                    <div class="product-info">
                        <div class="product-name">${highlightMatch(product.name, document.getElementById('productSearchInput')?.value)}</div>
                        <div class="product-code-text">${highlightMatch(product.code, document.getElementById('productSearchInput')?.value)}</div>
                    </div>
                </div>
            `).join('');
        }

        // 高亮匹配文字
        function highlightMatch(text, keyword) {
            if (!keyword || !keyword.trim()) return text;

            const kw = keyword.trim();
            const regex = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<mark style="background: #ffeb3b; padding: 0 2px;">$1</mark>');
        }

        // 切换产品选中状态
        function toggleProductSelection(productId) {
            const index = selectedProductIds.indexOf(productId);

            if (index > -1) {
                // 取消选中
                selectedProductIds.splice(index, 1);
            } else {
                // 添加选中
                selectedProductIds.push(productId);
            }

            // 更新UI
            const currentKeyword = document.getElementById('productSearchInput')?.value || '';
            const filtered = searchProducts(currentKeyword);
            renderProductList(filtered);
            updateSelectedProductsDisplay();
        }

        // 移除已选产品Tag
        function removeSelectedProduct(productId) {
            const index = selectedProductIds.indexOf(productId);
            if (index > -1) {
                selectedProductIds.splice(index, 1);

                // 刷新UI
                const currentKeyword = document.getElementById('productSearchInput')?.value || '';
                const filtered = searchProducts(currentKeyword);
                renderProductList(filtered);
                updateSelectedProductsDisplay();
            }
        }

        // 更新已选产品展示区域
        function updateSelectedProductsDisplay() {
            const area = document.getElementById('selectedProductsArea');
            const countEl = document.getElementById('selectedCount');
            const tagsEl = document.getElementById('selectedTags');

            if (selectedProductIds.length === 0) {
                area.style.display = 'none';
                return;
            }

            area.style.display = 'block';
            countEl.textContent = selectedProductIds.length;

            tagsEl.innerHTML = selectedProductIds.map(id => {
                const product = productData.find(p => p.id === id);
                const name = product ? product.name : id;
                const displayName = name.length > 15 ? name.substring(0, 15) + '...' : name;

                return `
                    <div class="product-tag" title="${name}">
                        <span class="product-tag-name">${displayName}</span>
                        <span class="tag-remove" onclick="removeSelectedProduct('${id}')">×</span>
                    </div>
                `;
            }).join('');
        }
        // ========== 产品选择器功能结束 ==========

        function getRandomGradient() {
            const gradients = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
                'linear-gradient(135deg, #30cfd0 0%, #330867 100%)'
            ];
            return gradients[Math.floor(Math.random() * gradients.length)];
        }

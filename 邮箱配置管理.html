<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱配置管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 14px; color: #333; background: #f5f5f5;
            min-height: 100vh; display: flex;
        }

        /* ======== 左侧导航栏 ======== */
        .sidebar {
            width: 200px; background: #fff; height: 100vh; position: fixed; left: 0; top: 0;
            border-right: 1px solid #e8e8e8; z-index: 100;
        }
        .sidebar-header {
            padding: 20px; display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; color: white;
        }
        .brand-name { font-weight: 600; font-size: 16px; color: #333; }
        .sidebar-menu { padding: 12px 0; }
        .menu-title {
            padding: 12px 20px; font-size: 12px; color: #999;
        }
        .menu-item {
            padding: 11px 20px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; color: #666; transition: all 0.15s;
        }
        .menu-item:hover { background: #e6f7ff; color: #1890ff; }
        .menu-item.active { background: #e6f7ff; color: #1890ff; border-right: 3px solid #1890ff; font-weight: 500; }
        .menu-icon { font-size: 16px; }

        /* ======== 主内容区 ======== */
        .main-content {
            flex: 1; margin-left: 200px; display: flex; flex-direction: column; overflow-x: auto;
        }
        .top-bar {
            background: #fff; padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #e8e8e8;
        }
        .top-bar h2 { font-size: 16px; font-weight: 600; }

        /* 页面主体：左右分栏 */
        .page-container { margin: 20px 24px; padding: 0; display: flex; gap: 16px; align-items: flex-start; }

        /* 左侧面板 */
        .left-panel {
            width: 340px; flex-shrink: 0;
            background: white; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden; max-height: calc(100vh - 120px);
            position: sticky; top: 80px;
        }
        .panel-section { border-bottom: 1px solid #f0f0f0; }
        .panel-title {
            padding: 12px 16px; font-size: 14px; font-weight: 600;
            background: #fafafa; border-bottom: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-body { padding: 12px 16px; }

        /* 数据类型Tab */
        .data-type-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; background: white; }
        .data-tab {
            padding: 6px 12px; border-radius: 4px; cursor: pointer;
            font-size: 13px; border: 1px solid #d9d9d9; background: white; transition: all 0.2s;
        }
        .data-tab:hover { border-color: #1890ff; color: #1890ff; }
        .data-tab.active { background: #1890ff; color: white; border-color: #1890ff; }

        /* 私客通用配置卡片 */
        .config-card {
            border: 2px solid #1890ff; border-radius: 6px; margin-bottom: 10px;
            background: #e6f7ff; cursor: pointer; transition: all 0.2s;
        }
        .config-card:hover { box-shadow: 0 2px 8px rgba(24,144,255,0.2); }
        .config-card.selected { border-color: #096dd9; background: #bae7ff; }
        .config-card-header {
            padding: 10px 12px; font-weight: 600; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .config-card-badge {
            font-size: 11px; padding: 2px 6px; border-radius: 3px;
            background: #1890ff; color: white;
        }
        .config-card-desc { padding: 0 12px 10px; font-size: 12px; color: #666; }

        /* 产品列表 */
        .product-list { max-height: 300px; overflow-y: auto; }
        .product-item {
            padding: 10px 12px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; transition: background 0.15s;
        }
        .product-item:hover { background: #f5f7fa; }
        .product-item.selected { background: #e6f7ff; border-left: 3px solid #1890ff; }
        .product-item-info { flex: 1; }
        .product-item-name { font-size: 13px; font-weight: 500; }
        .product-item-code { font-size: 11px; color: #999; margin-top: 2px; }
        .product-item-delete {
            opacity: 0; color: #ff4d4f; cursor: pointer; font-size: 16px; padding: 0 4px;
            transition: opacity 0.15s;
        }
        .product-item:hover .product-item-delete { opacity: 1; }

        /* 添加按钮 */
        .add-btn {
            width: 100%; padding: 10px; border: 1px dashed #d9d9d9; border-radius: 4px;
            background: none; cursor: pointer; color: #1890ff; font-size: 13px;
            transition: all 0.2s;
        }
        .add-btn:hover { border-color: #1890ff; background: #e6f7ff; }

        /* 右侧面板 */
        .right-panel {
            flex: 1; min-width: 0;
            background: white; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .right-header {
            padding: 16px 24px; border-bottom: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; align-items: center;
            background: #fafafa;
        }
        .right-header h2 { font-size: 16px; font-weight: 600; }
        .right-header-sub { font-size: 12px; color: #999; margin-top: 2px; }

        /* 邮箱类型标签栏 */
        .email-type-bar {
            padding: 10px 24px; border-bottom: 1px solid #f0f0f0;
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
            background: #fafafa;
        }
        .email-type-tag {
            padding: 4px 10px; border-radius: 3px; font-size: 12px;
            background: white; border: 1px solid #d9d9d9;
        }

        /* 竖排邮箱配置列表 */
        .matrix-list { padding: 16px 24px; }
        .matrix-row {
            display: flex; align-items: center; gap: 16px;
            padding: 12px 0; border-bottom: 1px solid #f0f0f0;
        }
        .matrix-row:last-child { border-bottom: none; }
        .matrix-row-label {
            width: 80px; flex-shrink: 0; font-weight: 500;
            font-size: 13px; color: #333;
        }
        .matrix-cell { flex: 1; min-width: 0; }

        /* 其他列 - 自由输入 */
        .other-input {
            width: 100%; padding: 6px 10px; border: 1px solid #d9d9d9;
            border-radius: 4px; font-size: 12px; line-height: 1.5;
            background: white; outline: none; transition: all 0.2s;
            min-height: 32px;
        }
        .other-input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
        .other-input.inherited { color: #999; font-style: italic; background: #fafafa; }

        .email-display {
            min-height: 32px; padding: 6px 10px; border: 1px solid #d9d9d9;
            border-radius: 4px; cursor: pointer; font-size: 12px; line-height: 1.5;
            background: white; transition: all 0.2s; word-break: break-all; position: relative;
        }
        .email-display:hover { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
        .email-display.empty { color: #bbb; }
        .email-display.inherited { color: #999; font-style: italic; background: #fafafa; }
        .email-count { font-size: 11px; color: #999; margin-left: 4px; }
        .clear-icon {
            position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
            color: #ccc; cursor: pointer; font-size: 14px; display: none;
        }
        .email-display:hover .clear-icon { display: block; }
        .clear-icon:hover { color: #ff4d4f; }

        /* 弹窗通用样式 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45); z-index: 1000;
            justify-content: center; align-items: flex-start; padding-top: 60px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 8px; width: 520px; max-height: 70vh;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column;
        }
        .modal-header {
            padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: 15px; font-weight: 600; }
        .modal-close {
            font-size: 20px; cursor: pointer; color: #999; line-height: 1;
            background: none; border: none; padding: 0 4px;
        }
        .modal-close:hover { color: #333; }
        .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
        .modal-footer {
            padding: 12px 20px; border-top: 1px solid #f0f0f0;
            display: flex; justify-content: flex-end; gap: 8px;
        }

        /* 按钮 */
        .btn {
            padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px;
            border: 1px solid #d9d9d9; background: white; transition: all 0.2s;
        }
        .btn:hover { border-color: #1890ff; color: #1890ff; }
        .btn-primary { background: #1890ff; color: white; border-color: #1890ff; }
        .btn-primary:hover { background: #096dd9; border-color: #096dd9; color: white; }
        .btn-danger { color: #ff4d4f; border-color: #ff4d4f; }
        .btn-danger:hover { background: #ff4d4f; color: white; }
        .btn-sm { padding: 3px 10px; font-size: 12px; }
        .btn-link { border: none; background: none; color: #1890ff; cursor: pointer; padding: 0; }
        .btn-link:hover { color: #096dd9; text-decoration: underline; }

        /* 搜索框 */
        .search-box {
            width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px;
            font-size: 13px; outline: none; margin-bottom: 12px;
        }
        .search-box:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }

        /* 联系人列表 */
        .contact-list { list-style: none; }
        .contact-item {
            display: flex; align-items: center; padding: 8px 10px;
            border-radius: 4px; cursor: pointer; transition: background 0.15s;
            border: 1px solid transparent; margin-bottom: 4px;
        }
        .contact-item:hover { background: #f5f7fa; }
        .contact-item.selected { background: #e6f7ff; border-color: #91d5ff; }
        .contact-checkbox { width: 16px; height: 16px; margin-right: 10px; cursor: pointer; accent-color: #1890ff; }
        .contact-info { flex: 1; }
        .contact-name { font-size: 13px; font-weight: 500; }
        .contact-email { font-size: 11px; color: #999; margin-top: 1px; }
        .contact-group-tag {
            font-size: 11px; padding: 1px 6px; border-radius: 3px;
            background: #f0f0f0; color: #666; margin-left: 8px;
        }

        /* 已选邮箱区 */
        .selected-emails-area {
            border: 1px solid #e8e8e8; border-radius: 4px; padding: 10px;
            margin-bottom: 12px; min-height: 48px; max-height: 120px; overflow-y: auto; background: #fafafa;
        }
        .selected-email-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px; border-radius: 3px; background: #e6f7ff;
            border: 1px solid #91d5ff; font-size: 12px; margin: 2px 4px 2px 0;
        }
        .selected-email-tag .remove-sel { cursor: pointer; color: #1890ff; font-size: 14px; line-height: 1; }
        .selected-email-tag .remove-sel:hover { color: #ff4d4f; }
        .no-selected { color: #bbb; font-size: 12px; line-height: 36px; }

        /* 产品选择弹窗 */
        .product-select-list { max-height: 300px; overflow-y: auto; }
        .product-select-item {
            padding: 10px 12px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; transition: background 0.15s;
        }
        .product-select-item:hover { background: #f5f7fa; }
        .product-select-item.added { opacity: 0.4; pointer-events: none; }
        .product-select-item.added::after { content: "已添加"; font-size: 11px; color: #52c41a; }

        /* 通讯录入口 */
        .address-book-entry {
            padding: 12px 16px; border-top: 1px solid #f0f0f0; background: #fafafa;
        }
        .ab-btn {
            width: 100%; padding: 8px; border: 1px dashed #d9d9d9; border-radius: 4px;
            background: white; cursor: pointer; font-size: 13px; color: #666;
            display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
        }
        .ab-btn:hover { border-color: #1890ff; color: #1890ff; }

        /* 通讯录表格 */
        .ab-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .ab-table th { background: #fafafa; padding: 8px 10px; text-align: left; border-bottom: 1px solid #e8e8e8; font-size: 12px; }
        .ab-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
        .ab-input { width: 100%; padding: 5px 8px; border: 1px solid #d9d9d9; border-radius: 3px; font-size: 12px; }
        .ab-input:focus { border-color: #1890ff; outline: none; }
        .ab-select { padding: 4px 6px; border: 1px solid #d9d9d9; border-radius: 3px; font-size: 12px; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 40px 20px; color: #bbb; }

        /* 提示 */
        .tip-text { font-size: 12px; color: #999; margin-top: 4px; }

        /* 继承标记 */
        .inherit-badge {
            font-size: 11px; color: #999; background: #f5f5f5;
            padding: 1px 6px; border-radius: 3px; margin-left: 4px;
        }
    </style>
</head>
<body>

<!-- ======== 左侧导航栏 ======== -->
<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo">妥</div>
        <div class="brand-name">妥妥递系统</div>
    </div>
    <div class="sidebar-menu">
        <div class="menu-title">功能菜单</div>
        <div class="menu-item" onclick="location.href='ta-data-send.html'"><span class="menu-icon">&#128231;</span>TA数据发送</div>
        <div class="menu-item" onclick="location.href='上会主功能界面.html'"><span class="menu-icon">&#128203;</span>上会主功能</div>
        <div class="menu-item"><span class="menu-icon">&#128101;</span>投资主体</div>
        <div class="menu-item"><span class="menu-icon">&#128193;</span>准入管理</div>
        <div class="menu-item" onclick="location.href='5-自动用印.html'"><span class="menu-icon">&#128220;</span>自动用印</div>
        <div class="menu-item" onclick="location.href='机构材料管理.html'"><span class="menu-icon">&#128229;</span>机构材料管理</div>
        <div class="menu-item" onclick="location.href='私募群管理人关系配置.html'"><span class="menu-icon">&#128172;</span>私募群管理人关系配置</div>
        <div class="menu-item active" onclick="location.href='邮箱配置管理.html'"><span class="menu-icon">&#128231;</span>邮箱配置管理</div>
        <div class="menu-item"><span class="menu-icon">&#9881;&#65039;</span>系统设置</div>
        <div class="menu-item"><span class="menu-icon">&#128267;</span>模拟器</div>
    </div>
</div>

<!-- ======== 主内容区 ======== -->
<div class="main-content">
    <div class="top-bar">
        <h2>邮箱配置管理</h2>
        <button class="btn btn-sm btn-primary" onclick="saveCurrentConfig()">保存全部配置</button>
    </div>

    <div class="page-container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <!-- 数据类型Tab -->
            <div class="data-type-tabs" id="dataTypeTabs"></div>

            <!-- 私客通用配置 -->
            <div class="panel-section">
                <div class="panel-title">私客通用配置（默认）</div>
                <div class="panel-body">
                    <div class="config-card selected" id="universalCard" onclick="selectConfig('universal')">
                        <div class="config-card-header">
                            <span>私客通用</span>
                            <span class="config-card-badge">默认模板</span>
                        </div>
                        <div class="config-card-desc">大部分期货资管产品共用此配置</div>
                    </div>
                </div>
            </div>

            <!-- 特殊产品配置（原产品级覆盖） -->
            <div class="panel-section" style="flex:1;">
                <div class="panel-title">
                    特殊产品配置
                    <button class="btn btn-sm btn-primary" onclick="openProductSelectModal()">+ 添加产品</button>
                </div>
                <div class="panel-body">
                    <div class="product-list" id="productList"></div>
                    <button class="add-btn" onclick="openProductSelectModal()">+ 添加特殊产品</button>
                    <p class="tip-text">选中的产品将使用独立邮箱配置，未单独配置的单元格继承私客通用</p>
                </div>
            </div>

            <!-- 通讯录入口 -->
            <div class="address-book-entry">
                <button class="ab-btn" onclick="openAddressBookModal()">
                    <span>&#128231;</span> 管理通讯录
                </button>
            </div>
        </div>

        <!-- 右侧面板：邮箱矩阵 -->
        <div class="right-panel">
            <div class="right-header">
                <div>
                    <h2 id="rightTitle">私客通用 - 净值</h2>
                    <div class="right-header-sub" id="rightSubTitle"></div>
                </div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-sm" onclick="saveCurrentConfig()">保存当前页</button>
                </div>
            </div>

            <!-- 邮箱类型标签栏 -->
            <div class="email-type-bar" id="emailTypeBar"></div>

            <!-- 竖排配置列表 -->
            <div class="matrix-list" id="matrixList"></div>
        </div>
    </div>
</div>

<!-- ==================== 邮箱选择弹窗 ==================== -->
<div class="modal-overlay" id="emailPickerModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="pickerTitle">选择邮箱</h3>
            <button class="modal-close" onclick="closeEmailPicker()">&times;</button>
        </div>
        <div class="modal-body">
            <input type="text" class="search-box" placeholder="搜索姓名或邮箱..." id="pickerSearch" oninput="filterContacts()">
            <div style="margin-bottom:8px;font-size:12px;color:#888;">已选择：</div>
            <div class="selected-emails-area" id="selectedEmailsArea"></div>
            <ul class="contact-list" id="contactListForPicker"></ul>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeEmailPicker()">取消</button>
            <button class="btn btn-primary" onclick="confirmEmailPick()">确定</button>
        </div>
    </div>
</div>

<!-- ==================== 产品选择弹窗 ==================== -->
<div class="modal-overlay" id="productSelectModal">
    <div class="modal">
        <div class="modal-header">
            <h3>选择产品</h3>
            <button class="modal-close" onclick="closeProductSelect()">&times;</button>
        </div>
        <div class="modal-body">
            <input type="text" class="search-box" placeholder="搜索产品代码或名称..." id="productSearchInput" oninput="filterProducts()">
            <div class="product-select-list" id="productSelectList"></div>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeProductSelect()">取消</button>
        </div>
    </div>
</div>

<!-- ==================== 通讯录管理弹窗 ==================== -->
<div class="modal-overlay" id="addressBookModal">
    <div class="modal" style="width:650px;">
        <div class="modal-header">
            <h3>通讯录管理</h3>
            <button class="modal-close" onclick="closeAddressBook()">&times;</button>
        </div>
        <div class="modal-body">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <input type="text" class="search-box" style="width:200px;" placeholder="搜索联系人..." id="abSearch" oninput="renderABTable()">
                <button class="btn btn-primary btn-sm" onclick="addNewContact()">+ 新增联系人</button>
            </div>
            <table class="ab-table" id="abTable">
                <thead>
                    <tr><th style="width:100px;">姓名</th><th style="width:220px;">邮箱地址</th><th style="width:140px;">所属邮箱类型</th><th style="width:80px;">操作</th></tr>
                </thead>
                <tbody id="abTableBody"></tbody>
            </table>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeAddressBook()">关闭</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// 数据模型
// ============================================================
const DEFAULT_EMAIL_TYPES = ['交易台', 'FOF', '风控', '后台', '外包', '托管', '我司'];
const DATA_TYPES = ['净值', '估值表', '交易确认单', '历史净值'];

const PRODUCT_LIBRARY = [
    { code: 'SKZX001', name: '私募尊享FOF1号' },
    { code: 'SKZX002', name: '私募尊享FOF2号' },
    { code: 'ZZJJ001', name: '尊享进取1号' },
    { code: 'ZZJJ002', name: '尊享进取2号' },
    { code: 'YF005', name: '衍复量化增强1号' },
    { code: 'JK001', name: '九坤量化对冲1号' },
    { code: 'HF002', name: '幻方量化中性3号' },
    { code: 'HY007', name: '黑翼对冲基金6号' },
];

let addressBook = [
    { id: 1, name: '张三', email: 'zhangsan@company.com', group: '交易台' },
    { id: 2, name: '李四', email: 'lisi@company.com', group: 'FOF' },
    { id: 3, name: '王五', email: 'wangwu@company.com', group: '风控' },
    { id: 4, name: '赵六', email: 'zhaoliu@company.com', group: '后台' },
    { id: 5, name: '钱七', email: 'qianqi@outsource.com', group: '外包' },
    { id: 6, name: '孙八', email: 'sunba@custody.com', group: '托管' },
    { id: 7, name: '周九', email: 'zhoujiu@company.com', group: '我司' },
    { id: 8, name: '吴十', email: 'wushi@fof.com', group: 'FOF' },
];

let currentDataType = DATA_TYPES[0];
let currentConfigKey = 'universal';
let currentEditingCell = null;
let tempSelectedEmails = [];

let configs = {};
let dataTypeEmailTypes = {};
let productOverrides = [];

function init() {
    loadFromStorage();
    renderDataTypeTabs();
    renderEmailTypeBar();
    selectConfig('universal');
}

// ============================================================
// 持久化
// ============================================================
function saveToStorage() {
    localStorage.setItem('emailConfigs', JSON.stringify(configs));
    localStorage.setItem('addressBook', JSON.stringify(addressBook));
    localStorage.setItem('productOverrides', JSON.stringify(productOverrides));
    localStorage.setItem('dataTypeEmailTypes', JSON.stringify(dataTypeEmailTypes));
}

function loadFromStorage() {
    try {
        const saved = localStorage.getItem('emailConfigs'); if (saved) configs = JSON.parse(saved);
        const ab = localStorage.getItem('addressBook'); if (ab) addressBook = JSON.parse(ab);
        const po = localStorage.getItem('productOverrides'); if (po) productOverrides = JSON.parse(po);
        const dtet = localStorage.getItem('dataTypeEmailTypes'); if (dtet) dataTypeEmailTypes = JSON.parse(dtet);
    } catch(e) {}
    DATA_TYPES.forEach(dt => {
        if (!configs[dt]) configs[dt] = {};
        if (!configs[dt]['universal']) configs[dt]['universal'] = {};
        if (!dataTypeEmailTypes[dt]) {
            dataTypeEmailTypes[dt] = [...DEFAULT_EMAIL_TYPES];
            if (dt === '净值') dataTypeEmailTypes[dt] = dataTypeEmailTypes[dt].filter(t => t !== '交易台');
        }
    });
}

// ============================================================
// 数据类型Tab
// ============================================================
function renderDataTypeTabs() {
    document.getElementById('dataTypeTabs').innerHTML = DATA_TYPES.map(dt =>
        `<div class="data-tab ${dt === currentDataType ? 'active' : ''}" onclick="switchDataType('${dt}')">${dt}</div>`
    ).join('');
}
function switchDataType(dt) {
    currentDataType = dt;
    renderDataTypeTabs();
    renderEmailTypeBar();
    renderMatrix();
    updateRightHeader();
}

// ============================================================
// 邮箱类型列
// ============================================================
function getEmailTypesForCurrentDt() { return dataTypeEmailTypes[currentDataType] || [...DEFAULT_EMAIL_TYPES]; }

function renderEmailTypeBar() {
    document.getElementById('emailTypeBar').innerHTML = getEmailTypesForCurrentDt().map(t =>
        `<span class="email-type-tag">${t}</span>`
    ).join('') + '<span class="email-type-tag">其他</span>';
}

// ============================================================
// 配置选择
// ============================================================
function selectConfig(key) {
    currentConfigKey = key;
    document.querySelectorAll('.config-card').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.product-item').forEach(p => p.classList.remove('selected'));
    if (key === 'universal') {
        document.getElementById('universalCard').classList.add('selected');
    } else {
        const item = document.querySelector(`.product-item[data-code="${key}"]`);
        if (item) item.classList.add('selected');
    }
    renderMatrix(); updateRightHeader();
}

function updateRightHeader() {
    let title, sub;
    if (currentConfigKey === 'universal') {
        title = `私客通用 - ${currentDataType}`; sub = '默认模板，大部分产品共用';
    } else {
        const prod = productOverrides.find(p => p.code === currentConfigKey);
        title = `${prod ? prod.name : currentConfigKey} - ${currentDataType}`;
        sub = `特殊产品独立配置，未单独配置的单元格将继承私客通用`;
    }
    document.getElementById('rightTitle').textContent = title;
    document.getElementById('rightSubTitle').textContent = sub;
}

// ============================================================
// 竖排配置列表
// ============================================================
function renderMatrix() {
    const types = getEmailTypesForCurrentDt();
    const allTypes = [...types, '其他'];
    let html = '';

    // 当前配置行
    const configName = currentConfigKey === 'universal'
        ? '<strong>私客通用</strong>'
        : (() => { const p = productOverrides.find(x=>x.code===currentConfigKey); return p ? `<strong>${p.name}</strong><small style="color:#999;margin-left:6px;">${p.code}</small>` : currentConfigKey; })();

    html += `<div style="margin-bottom:16px;"><div style="font-size:13px;color:#999;margin-bottom:8px;">${configName}</div>`;
    html += allTypes.map(t => renderVerticalCell(currentDataType, currentConfigKey, t)).join('');
    html += `</div>`;

    // 特殊产品显示继承预览
    if (currentConfigKey !== 'universal') {
        html += `<div style="border-top:2px solid #e8e8e8;padding-top:16px;">
            <div style="font-size:12px;color:#999;margin-bottom:8px;">实际生效（含继承私客通用）</div>`;
        html += allTypes.map(t => renderVerticalPreview(currentDataType, currentConfigKey, t)).join('');
        html += `</div>`;
    }

    document.getElementById('matrixList').innerHTML = html;
}

function renderVerticalCell(dt, key, et) {
    if (et === '其他') {
        const val = configs[dt]?.[key]?.['其他'] || '';
        const isUniversal = key === 'universal';
        const hasOwn = configs[dt]?.[key]?.['其他'] !== undefined;
        const cls = !isUniversal && !hasOwn ? 'inherited' : '';
        return `<div class="matrix-row">
            <div class="matrix-row-label">其他</div>
            <div class="matrix-cell"><input type="text" class="other-input ${cls}" placeholder="${isUniversal ? '输入邮箱，多个用;分隔' : (hasOwn ? '' : '继承通用')}" value="${val}" onchange="saveOtherEmail('${dt}','${key}',this.value)"></div>
        </div>`;
    }
    return `<div class="matrix-row">
        <div class="matrix-row-label">${et}</div>
        <div class="matrix-cell">${renderCell(dt, key, et)}</div>
    </div>`;
}

function renderVerticalPreview(dt, key, et) {
    if (et === '其他') {
        const own = configs[dt]?.[key]?.['其他'];
        const val = own !== undefined ? own : (configs[dt]?.['universal']?.['其他'] || '');
        return `<div class="matrix-row" style="background:#fafafa;">
            <div class="matrix-row-label" style="color:#999;">其他</div>
            <div class="matrix-cell"><div class="email-display inherited">${val || '<span class="empty">(无)</span>'}</div></div>
        </div>`;
    }
    const emails = getEffectiveEmails(dt, key, et);
    return `<div class="matrix-row" style="background:#fafafa;">
        <div class="matrix-row-label" style="color:#999;">${et}</div>
        <div class="matrix-cell"><div class="email-display inherited" onclick="openCellPicker('${dt}','${key}','${et}')">${emails.length > 0 ? emails.join('; ') + '<span class="email-count">' + emails.length + '个</span>' : '<span class="empty">(无)</span>'}</div></div>
    </div>`;
}

function saveOtherEmail(dt, key, val) {
    if (!configs[dt]) configs[dt] = {};
    if (!configs[dt][key]) configs[dt][key] = {};
    if (!val || val.trim() === '') delete configs[dt][key]['其他'];
    else configs[dt][key]['其他'] = val.trim();
    saveToStorage();
    renderMatrix();
}

function renderCell(dt, key, et) {
    const cellEmails = getConfigEmails(dt, key, et);
    const hasOwn = configs[dt]?.[key]?.[et] !== undefined;
    const displayEmails = hasOwn ? cellEmails : [];
    const isUniversal = key === 'universal';
    return `<div class="email-display ${displayEmails.length === 0 && !isUniversal ? 'inherited empty' : ''}" onclick="openCellPicker('${dt}','${key}','${et}')" title="${isUniversal ? '' : (hasOwn ? '已单独配置' : '继承自私客通用')}">${
        displayEmails.length > 0
            ? displayEmails.join('; ') + '<span class="email-count">' + displayEmails.length + '个</span>'
            : (isUniversal ? '<span class="empty">点击选择邮箱...</span>' : '<span class="empty">继承通用</span>')
    }${displayEmails.length > 0 ? '<span class="clear-icon" onclick="event.stopPropagation();clearCell(\'' + dt + '\',\'' + key + '\',\'' + et + '\')">&times;</span>' : ''}${!isUniversal && !hasOwn ? '<span class="inherit-badge">继承</span>' : ''}</div>`;
}

function getConfigEmails(dt, key, et) { return configs[dt]?.[key]?.[et] || []; }
function getEffectiveEmails(dt, key, et) { const own = configs[dt]?.[key]?.[et]; if (own && own.length > 0) return own; return configs[dt]?.['universal']?.[et] || []; }

function clearCell(dt, key, et) { if (configs[dt]?.[key]) delete configs[dt][key][et]; saveToStorage(); renderMatrix(); }
function saveCurrentConfig() { saveToStorage(); alert('配置已保存'); }

// ============================================================
// 邮箱选择器弹窗
// ============================================================
function openCellPicker(dt, key, et) {
    currentEditingCell = { dataType: dt, configKey: key, emailType: et };
    tempSelectedEmails = getConfigEmails(dt, key, et).map(e => { const c = addressBook.find(x => x.email === e); return c ? c.email : e; });
    document.getElementById('pickerTitle').textContent = '选择邮箱 - ' + (key === 'universal' ? '私客通用' : key) + ' / ' + dt + ' / ' + et;
    renderSelectedEmails(); renderContactPickerList(); document.getElementById('pickerSearch').value = '';
    document.getElementById('emailPickerModal').classList.add('show');
}
function closeEmailPicker() { document.getElementById('emailPickerModal').classList.remove('show'); currentEditingCell = null; tempSelectedEmails = []; }
function filterContacts() { renderContactPickerList(); }

function renderContactPickerList() {
    const kw = document.getElementById('pickerSearch').value.toLowerCase().trim();
    const filtered = addressBook.filter(c => !kw || c.name.toLowerCase().includes(kw) || c.email.toLowerCase().includes(kw));
    const el = document.getElementById('contactListForPicker');
    el.innerHTML = filtered.map(c => `<li class="contact-item ${tempSelectedEmails.includes(c.email) ? 'selected' : ''}" onclick="toggleContactPick('${c.email}')"><input type="checkbox" class="contact-checkbox" ${tempSelectedEmails.includes(c.email) ? 'checked' : ''} onchange="event.stopPropagation();toggleContactPick('${c.email}')"><div class="contact-info"><div class="contact-name">${c.name} <span class="contact-group-tag">${c.group}</span></div><div class="contact-email">${c.email}</div></div></li>`).join('');
    if (filtered.length === 0) el.innerHTML = '<div class="empty-state">无匹配联系人，请先在通讯录中添加</div>';
}

function toggleContactPick(email) {
    const idx = tempSelectedEmails.indexOf(email);
    if (idx >= 0) tempSelectedEmails.splice(idx, 1); else tempSelectedEmails.push(email);
    renderSelectedEmails(); renderContactPickerList();
}

function renderSelectedEmails() {
    const area = document.getElementById('selectedEmailsArea');
    area.innerHTML = tempSelectedEmails.length === 0 ? '<div class="no-selected">尚未选择任何邮箱</div>'
        : tempSelectedEmails.map(e => { const c = addressBook.find(x => x.email === e); return '<span class="selected-email-tag">' + (c ? c.name : e) + '<span class="remove-sel" onclick="removeTempEmail(\'' + e + '\')">&times;</span></span>'; }).join('');
}
function removeTempEmail(email) { tempSelectedEmails = tempSelectedEmails.filter(e => e !== email); renderSelectedEmails(); renderContactPickerList(); }

function confirmEmailPick() {
    if (!currentEditingCell) return;
    const { dataType, configKey, emailType } = currentEditingCell;
    if (!configs[dataType]) configs[dataType] = {};
    if (!configs[dataType][configKey]) configs[dataType][configKey] = {};
    if (tempSelectedEmails.length > 0) configs[dataType][configKey][emailType] = [...tempSelectedEmails];
    else delete configs[dataType][configKey][emailType];
    saveToStorage(); closeEmailPicker(); renderMatrix();
}

// ============================================================
// 产品选择与覆盖
// ============================================================
function openProductSelectModal() { document.getElementById('productSelectModal').classList.add('show'); document.getElementById('productSearchInput').value = ''; renderProductSelectList(); }
function closeProductSelect() { document.getElementById('productSelectModal').classList.remove('show'); }
function filterProducts() { renderProductSelectList(); }

function renderProductSelectList() {
    const kw = document.getElementById('productSearchInput').value.toLowerCase().trim();
    const addedCodes = productOverrides.map(p => p.code);
    const filtered = PRODUCT_LIBRARY.filter(p => p.code.toLowerCase().includes(kw) || p.name.includes(kw));
    document.getElementById('productSelectList').innerHTML = filtered.map(p =>
        `<div class="product-select-item ${addedCodes.includes(p.code) ? 'added' : ''}" onclick="${addedCodes.includes(p.code) ? '' : "addProductOverride('" + p.code + "','" + p.name + "')"}"><div><div style="font-weight:500;font-size:13px;">${p.name}</div><div style="font-size:11px;color:#999;">${p.code}</div></div></div>`
    ).join('');
}

function addProductOverride(code, name) {
    if (productOverrides.find(p => p.code === code)) return;
    productOverrides.push({ code, name }); saveToStorage(); renderProductList(); closeProductSelect();
    DATA_TYPES.forEach(dt => { if (!configs[dt]) configs[dt] = {}; if (!configs[dt][code]) configs[dt][code] = {}; });
    selectConfig(code);
}

function removeProductOverride(code) {
    if (!confirm('确定移除产品 ' + code + ' 的配置？')) return;
    productOverrides = productOverrides.filter(p => p.code !== code);
    DATA_TYPES.forEach(dt => { if (configs[dt]) delete configs[dt][code]; });
    if (currentConfigKey === code) selectConfig('universal');
    saveToStorage(); renderProductList(); renderMatrix();
}

function renderProductList() {
    const el = document.getElementById('productList');
    if (productOverrides.length === 0) { el.innerHTML = '<div class="empty-state" style="padding:20px;">暂无特殊产品<br><small style="color:#bbb;">点击下方按钮添加</small></div>'; return; }
    el.innerHTML = productOverrides.map(p =>
        `<div class="product-item ${p.code === currentConfigKey ? 'selected' : ''}" data-code="${p.code}" onclick="selectConfig('${p.code}')"><div class="product-item-info"><div class="product-item-name">${p.name}</div><div class="product-item-code">${p.code}</div></div><span class="product-item-delete" onclick="event.stopPropagation();removeProductOverride('${p.code}')">&times;</span></div>`
    ).join('');
}

// ============================================================
// 通讯录管理
// ============================================================
function openAddressBookModal() { document.getElementById('addressBookModal').classList.add('show'); renderABTable(); }
function closeAddressBook() { document.getElementById('addressBookModal').classList.remove('show'); }

function renderABTable() {
    const kw = document.getElementById('abSearch').value.toLowerCase().trim();
    const filtered = kw ? addressBook.filter(c => c.name.toLowerCase().includes(kw) || c.email.toLowerCase().includes(kw)) : addressBook;
    document.getElementById('abTableBody').innerHTML = filtered.map(c =>
        `<tr><td><input type="text" class="ab-input" value="${c.name}" onchange="updateContact(${c.id},'name',this.value)"></td><td><input type="text" class="ab-input" value="${c.email}" onchange="updateContact(${c.id},'email',this.value)"></td><td><select class="ab-select" onchange="updateContact(${c.id},'group',this.value)">${DEFAULT_EMAIL_TYPES.map(g => '<option value="' + g + '"' + (c.group === g ? ' selected' : '') + '>' + g + '</option>').join('')}<option value="">-- 未分组 --</option></select></td><td><button class="btn btn-sm btn-danger" onclick="deleteContact(${c.id})">删除</button></td></tr>`
    ).join('');
}

function addNewContact() {
    const newId = Math.max(...addressBook.map(c => c.id), 0) + 1;
    addressBook.push({ id: newId, name: '', email: '', group: '' }); saveToStorage(); renderABTable();
    setTimeout(() => { const inputs = document.querySelectorAll('#abTableBody input.ab-input'); if (inputs.length > 0) inputs[inputs.length - 2].focus(); }, 50);
}
function updateContact(id, field, value) { const c = addressBook.find(x => x.id === id); if (c) c[field] = value; saveToStorage(); }
function deleteContact(id) { if (!confirm('确定删除该联系人？')) return; addressBook = addressBook.filter(c => c.id !== id); saveToStorage(); renderABTable(); }

init(); renderProductList();
</script>
